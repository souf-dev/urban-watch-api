services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: urban-watch-api:gpu
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./outputs:/app/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
